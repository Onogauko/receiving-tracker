<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Receiving Log - Magenta Aeon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Firebase SDK (Compat) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fdf2f8; -webkit-tap-highlight-color: transparent; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #f0abfc; border-radius: 10px; }

        .history-line::before {
            content: '';
            position: absolute;
            left: 15px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #fae8ff;
        }

        .spinner {
            border: 3px solid rgba(217, 70, 239, 0.1);
            border-left-color: #d946ef;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .glass-effect { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="antialiased text-slate-900">

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-xl relative">
        <header class="bg-white/95 backdrop-blur-md border-b border-fuchsia-100 p-5 sticky top-0 z-30 shadow-sm">
            <div class="flex justify-between items-start mb-5">
                <div>
                    <h1 class="text-2xl font-extrabold tracking-tight text-fuchsia-900">Receiving Log</h1>
                    <p class="text-[10px] text-fuchsia-400 font-bold uppercase tracking-widest mt-0.5">Ringkasan Riwayat Kedatangan Barang</p>
                </div>
                <div class="flex flex-col items-end pt-1">
                    <div class="flex items-center gap-2 mb-1">
                        <span id="lastSyncLabel" class="text-[8px] text-fuchsia-400 uppercase font-black tracking-tighter">Connecting...</span>
                        <div id="statusDot" class="h-2 w-2 rounded-full bg-slate-300"></div>
                    </div>
                    <button onclick="openUploadModal()" class="p-2.5 bg-fuchsia-50 text-fuchsia-600 rounded-xl hover:bg-fuchsia-100 transition-all cursor-pointer shadow-sm active:scale-90" title="Upload Database">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.58 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.58 4 8 4s8-1.79 8-4M4 7c0-2.21 3.58-4 8-4s8 1.79 8 4m0 5c0 2.21-3.58 4-8 4s-8-1.79-8-4"></path></svg>
                    </button>
                    <div id="dbDateContainer" class="hidden text-right mt-2">
                        <p class="text-[7px] text-slate-400 font-bold leading-none uppercase tracking-tighter">Data Sampai:</p>
                        <p id="dbDateLabel" class="text-[9px] text-fuchsia-500 font-black leading-tight uppercase tracking-tighter mt-0.5"></p>
                    </div>
                </div>
            </div>
            
            <div class="relative group">
                <input type="text" id="searchInput" placeholder="Cari SKU, nama barang, atau supplier..." 
                    class="w-full bg-fuchsia-50 border-2 border-fuchsia-100/50 rounded-2xl py-3.5 pl-12 pr-10 text-sm focus:bg-white focus:border-fuchsia-500 transition-all outline-none shadow-inner">
                <div class="absolute left-4 top-3.5 text-fuchsia-300">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>
        </header>

        <main class="flex-1 p-4" id="itemList">
            <div id="loading" class="space-y-4">
                <div class="h-32 bg-fuchsia-50 border border-fuchsia-100 animate-pulse rounded-[2.2rem]"></div>
                <div class="h-32 bg-fuchsia-50 border border-fuchsia-100 animate-pulse rounded-[2.2rem]"></div>
                <div class="h-32 bg-fuchsia-50 border border-fuchsia-100 animate-pulse rounded-[2.2rem]"></div>
            </div>
        </main>

        <div class="sticky bottom-0 z-20 bg-white border-t border-fuchsia-100 shadow-[0_-10px_25px_rgba(0,0,0,0.03)]">
            <nav class="p-5 flex justify-between items-center safe-bottom">
                <div class="flex flex-col">
                    <span class="text-[10px] font-bold text-fuchsia-400 uppercase tracking-widest">SKU Terdaftar</span>
                    <span id="totalCount" class="text-xl font-black text-fuchsia-900">0</span>
                </div>
                <button id="refreshBtn" onclick="fetchData()" class="bg-fuchsia-700 text-white px-8 py-3.5 rounded-2xl font-bold flex items-center gap-3 active:scale-95 transition-all shadow-lg shadow-fuchsia-200">
                    <div id="btnSpinner" class="spinner hidden"></div>
                    <span id="refreshText">Update Cloud</span>
                </button>
            </nav>
        </div>

        <!-- Modal Riwayat Detail -->
        <div id="modal" class="fixed inset-0 bg-fuchsia-900/60 backdrop-blur-sm z-[100] hidden flex items-end sm:items-center justify-center p-0 sm:p-4">
            <div class="bg-white w-full max-w-md rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 animate-slide-up shadow-2xl max-h-[85vh] flex flex-col">
                <div class="w-12 h-1.5 bg-fuchsia-100 rounded-full mx-auto mb-8 sm:hidden shrink-0"></div>
                <div class="mb-6 shrink-0">
                    <p id="modalSku" class="text-[10px] font-black text-fuchsia-600 uppercase tracking-[0.2em] mb-2"></p>
                    <h2 id="modalTitle" class="text-2xl font-bold text-slate-900 leading-tight text-lg">Detail Riwayat</h2>
                    <p id="modalSupplier" class="text-[10px] text-slate-400 mt-1 uppercase font-bold tracking-wider"></p>
                </div>
                <div class="flex-1 overflow-y-auto mb-6 pr-2">
                    <div id="historyList" class="relative history-line pl-8 space-y-6"></div>
                </div>
                <div class="flex gap-4 pt-4 border-t border-fuchsia-50 shrink-0">
                    <button onclick="closeModal()" class="flex-1 py-4.5 font-bold text-white bg-fuchsia-800 rounded-2xl shadow-xl active:scale-[0.98] transition-all">Tutup Riwayat</button>
                </div>
            </div>
        </div>

        <!-- Modal Upload -->
        <div id="uploadModal" class="fixed inset-0 bg-slate-900/80 backdrop-blur-md hidden flex items-center justify-center p-4 z-[101]">
            <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-8 shadow-2xl flex flex-col overflow-hidden animate-slide-up">
                <div class="mb-4">
                    <h2 class="text-2xl font-bold text-slate-900">Upload Database</h2>
                    <p class="text-xs text-slate-500 mt-1">Pilih file CSV atau tempel data dari Excel.</p>
                </div>

                <div id="dropZone" class="mb-4 border-2 border-dashed border-fuchsia-200 rounded-2xl p-6 flex flex-col items-center justify-center bg-fuchsia-50/30 hover:bg-fuchsia-50 transition-all cursor-pointer group" onclick="document.getElementById('fileInput').click()">
                    <input type="file" id="fileInput" accept=".csv, .txt" class="hidden" onchange="handleFileSelect(event)">
                    <div class="p-3 bg-white rounded-full shadow-sm text-fuchsia-500 mb-2 group-hover:scale-110 transition-transform">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                    </div>
                    <p class="text-[10px] font-bold text-fuchsia-600 uppercase tracking-widest">Klik untuk Pilih File .CSV</p>
                    <p id="fileNameDisplay" class="text-[9px] text-slate-400 mt-1">Atau drag & drop file di sini</p>
                </div>

                <textarea id="dataInput" placeholder="Tempel baris dari Excel di sini..." 
                    class="flex-1 w-full h-32 p-4 bg-slate-50 border-2 border-slate-100 rounded-2xl font-mono text-[11px] focus:bg-white focus:border-fuchsia-500 outline-none resize-none placeholder:text-slate-300"></textarea>
                
                <div class="mt-6 flex gap-3">
                    <button onclick="closeUploadModal()" class="flex-1 py-4 font-bold text-slate-400 bg-slate-100 rounded-2xl hover:bg-slate-200 transition-all">Batal</button>
                    <button id="syncBtn" onclick="processDataUpload()" class="flex-[2] py-4 font-bold text-white bg-fuchsia-600 rounded-2xl shadow-lg shadow-fuchsia-100 hover:bg-fuchsia-700 transition-all">Mulai Sync Data</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAB1YK8Jzzhot_6KTgnBtCODPq5BVFrH_c",
            authDomain: "magenta-aeon.firebaseapp.com",
            databaseURL: "https://magenta-aeon-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "magenta-aeon",
            storageBucket: "magenta-aeon.firebasestorage.app",
            messagingSenderId: "508296835246",
            appId: "1:508296835246:web:7164e0d1e81200de6ffd3f"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const STORAGE_KEY = "receiving_tracker_data_v2";
        let groupedInventory = {};

        function parseIndoDate(dateStr) {
            if (!dateStr) return null;
            const cleanStr = dateStr.trim();
            
            // Handle DD/MM/YYYY or DD-MM-YYYY
            const parts = cleanStr.split(/[\/\-]/);
            if (parts.length === 3) {
                let day, month, year;
                // Detect if it's YYYY-MM-DD (length of first part is 4) or DD-MM-YYYY
                if (parts[0].length === 4) {
                    year = parts[0]; month = parts[1]; day = parts[2];
                } else {
                    day = parts[0]; month = parts[1]; year = parts[2];
                    // Handle 2-digit year
                    if (year.length === 2) year = "20" + year;
                }
                // Return in ISO Format for reliable sorting YYYY-MM-DD
                return `${year}-${month.padStart(2, '0')}-${day.padStart(2, '0')}`;
            }

            // Fallback to native for other formats
            const d = new Date(cleanStr);
            return isNaN(d.getTime()) ? cleanStr : d.toISOString().split('T')[0];
        }

        function formatDate(dateStr, long = false) {
            if (!dateStr) return "-";
            try {
                // Ensure we parse our custom format
                const parts = dateStr.split('-');
                let date;
                if (parts.length === 3) {
                    date = new Date(parts[0], parts[1] - 1, parts[2]);
                } else {
                    date = new Date(dateStr);
                }

                if (isNaN(date.getTime())) return dateStr;
                const options = long ? { day: '2-digit', month: 'long', year: 'numeric' } : { day: '2-digit', month: 'short', year: 'numeric' };
                return new Intl.DateTimeFormat('id-ID', options).format(date);
            } catch (e) { return dateStr; }
        }

        async function processDataUpload() {
            const input = document.getElementById('dataInput').value;
            const syncBtn = document.getElementById('syncBtn');
            if (!input.trim()) return showNotification("Data kosong!", "error");

            syncBtn.disabled = true;
            syncBtn.innerText = "Memproses...";

            try {
                const rawData = parseInput(input);
                if (rawData.length === 0) throw new Error("Tidak ada data baris yang valid");

                const newGrouped = {};
                rawData.forEach(item => {
                    // Clean SKU: handle leading zeros from Excel
                    const sku = String(item.sku).trim().padStart(7, '0');
                    if (!newGrouped[sku]) {
                        newGrouped[sku] = {
                            sku: sku,
                            description: String(item.description),
                            supplier: String(item.supplier),
                            arrivals: []
                        };
                    }
                    if (item.date) {
                        const standardizedDate = parseIndoDate(item.date);
                        if (standardizedDate) newGrouped[sku].arrivals.push(standardizedDate);
                    }
                });

                // Sort arrivals for each item before saving
                Object.keys(newGrouped).forEach(sku => {
                    newGrouped[sku].arrivals.sort((a, b) => new Date(b) - new Date(a));
                });

                await db.ref('inventory').set(newGrouped);
                
                closeUploadModal();
                document.getElementById('dataInput').value = "";
                showNotification("Berhasil Sinkronisasi " + Object.keys(newGrouped).length + " SKU!");
            } catch (e) {
                console.error(e);
                showNotification(e.message || "Gagal! Periksa format file.", "error");
            } finally {
                syncBtn.disabled = false;
                syncBtn.innerText = "Mulai Sync Data";
            }
        }

        function renderItems(items) {
            const container = document.getElementById('itemList');
            document.getElementById('totalCount').innerText = items.length;
            
            if (items.length === 0) {
                container.innerHTML = `<div class="text-center py-20 opacity-40 font-bold text-fuchsia-300 italic">Database Kosong</div>`;
                return;
            }
            
            container.innerHTML = '';
            items.forEach(item => {
                const count = item.arrivals ? item.arrivals.length : 0;
                const sortedDates = count > 0 ? [...item.arrivals].sort((a, b) => new Date(b) - new Date(a)) : [];
                const lastDate = count > 0 ? formatDate(sortedDates[0]) : 'Belum Ada';
                
                const card = document.createElement('div');
                card.className = `p-6 rounded-[2.2rem] mb-5 border transition-all cursor-pointer active:scale-[0.96] bg-white border-fuchsia-100 shadow-sm`;
                card.onclick = () => openModal(item.sku);
                card.innerHTML = `
                    <div class="flex justify-between items-start gap-4">
                        <div class="flex-1">
                            <span class="text-[9px] font-black text-fuchsia-600 uppercase tracking-[0.2em] mb-1.5 block">${item.sku}</span>
                            <h3 class="font-bold text-slate-900 leading-tight text-md mb-2 line-clamp-2">${item.description}</h3>
                            <span class="bg-fuchsia-50 text-fuchsia-500 text-[8px] px-2.5 py-1 rounded-lg font-black uppercase tracking-widest border border-fuchsia-100">${item.supplier}</span>
                        </div>
                        <div class="shrink-0">
                             <div class="${count > 0 ? 'bg-fuchsia-600 text-white' : 'bg-white text-fuchsia-200 border border-fuchsia-100'} px-3 py-1 rounded-full text-[9px] font-black shadow-sm uppercase">${count}x Masuk</div>
                        </div>
                    </div>
                    <div class="mt-5 pt-4 border-t border-fuchsia-50 flex items-center justify-between">
                        <span class="text-[9px] font-black text-fuchsia-300 uppercase tracking-[0.1em]">Kedatangan terakhir</span>
                        <span class="text-xs font-bold text-fuchsia-800">${lastDate}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function updateDatabaseDateLabel() {
            let latestDate = null;
            Object.values(groupedInventory).forEach(item => {
                if (item.arrivals) {
                    item.arrivals.forEach(dateStr => {
                        const d = new Date(dateStr);
                        if (!isNaN(d.getTime())) if (!latestDate || d > latestDate) latestDate = d;
                    });
                }
            });
            if (latestDate) {
                document.getElementById('dbDateLabel').innerText = formatDate(latestDate, true);
                document.getElementById('dbDateContainer').classList.remove('hidden');
            }
        }

        function handleFileSelect(event) {
            const file = event.target.files[0];
            if (!file) return;
            document.getElementById('fileNameDisplay').innerText = "File: " + file.name;
            const reader = new FileReader();
            reader.onload = (e) => document.getElementById('dataInput').value = e.target.result;
            reader.readAsText(file);
        }

        function openModal(sku) {
            const item = groupedInventory[sku];
            if (!item) return;
            document.getElementById('modalTitle').innerText = item.description;
            document.getElementById('modalSku').innerText = "KODE SKU: " + item.sku;
            document.getElementById('modalSupplier').innerText = "Supplier: " + item.supplier;
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';
            const sortedArrivals = [...(item.arrivals || [])].sort((a, b) => new Date(b) - new Date(a));
            sortedArrivals.forEach((date, i) => {
                const entry = document.createElement('div');
                entry.className = "relative";
                entry.innerHTML = `
                    <div class="absolute -left-[23px] top-1.5 h-4 w-4 rounded-full border-4 border-white ${i === 0 ? 'bg-fuchsia-600' : 'bg-fuchsia-200'} shadow-sm"></div>
                    <div class="bg-fuchsia-50/50 p-4 rounded-2xl border border-fuchsia-100/50">
                        <p class="text-[9px] font-black text-fuchsia-300 tracking-widest mb-1 uppercase">Log #${sortedArrivals.length - i}</p>
                        <p class="text-sm font-bold text-fuchsia-900">${formatDate(date, true)}</p>
                    </div>
                `;
                historyList.appendChild(entry);
            });
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        function openUploadModal() { document.getElementById('uploadModal').classList.remove('hidden'); }
        function closeUploadModal() { document.getElementById('uploadModal').classList.add('hidden'); }
        function showNotification(msg, type = "success") {
            const toast = document.createElement('div');
            toast.className = `fixed top-10 left-1/2 -translate-x-1/2 z-[200] px-6 py-3 rounded-2xl shadow-2xl font-bold text-white text-sm animate-slide-up ${type === 'success' ? 'bg-emerald-500' : 'bg-red-500'}`;
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase().trim();
            const filtered = Object.values(groupedInventory).filter(i => i.sku.toLowerCase().includes(val) || i.description.toLowerCase().includes(val) || i.supplier.toLowerCase().includes(val));
            renderItems(filtered);
        });

        window.onclick = (e) => { if(e.target.id === 'modal') closeModal(); if(e.target.id === 'uploadModal') closeUploadModal(); };
        window.onload = fetchData;
    </script>
</body>
</html>
