<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receiving Tracker Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        .history-line::before {
            content: '';
            position: absolute;
            left: 15px;
            top: 0;
            bottom: 0;
            width: 2px;
            background: #f1f5f9;
        }
    </style>
</head>
<body class="antialiased text-slate-900">

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col bg-white shadow-xl relative">
        <!-- Header -->
        <header class="bg-white/95 backdrop-blur-md border-b p-5 sticky top-0 z-30 shadow-sm">
            <div class="flex justify-between items-center mb-5">
                <div>
                    <h1 class="text-2xl font-extrabold tracking-tight text-slate-900">Receiving Log</h1>
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-0.5">Ringkasan Riwayat Barang</p>
                </div>
                <div id="connectionStatus" class="h-2.5 w-2.5 rounded-full bg-slate-300"></div>
            </div>
            
            <div class="relative group">
                <input type="text" id="searchInput" placeholder="Cari SKU atau nama barang..." 
                    class="w-full bg-slate-100 border-2 border-transparent rounded-2xl py-3.5 pl-12 pr-10 text-sm focus:bg-white focus:border-blue-500 transition-all outline-none shadow-inner">
                <div class="absolute left-4 top-3.5 text-slate-400">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 p-4" id="itemList">
            <div id="loading" class="space-y-4">
                <div class="h-32 bg-slate-50 border border-slate-100 animate-pulse rounded-[2.2rem]"></div>
                <div class="h-32 bg-slate-50 border border-slate-100 animate-pulse rounded-[2.2rem]"></div>
            </div>
        </main>

        <!-- Footer -->
        <nav class="bg-white border-t p-5 flex justify-between items-center sticky bottom-0 safe-bottom shadow-[0_-10px_25px_rgba(0,0,0,0.03)] z-20">
            <div class="flex flex-col">
                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">SKU Unik</span>
                <span id="totalCount" class="text-xl font-black text-slate-800">0</span>
            </div>
            <button id="refreshBtn" onclick="fetchData()" class="bg-slate-900 text-white px-8 py-3.5 rounded-2xl font-bold flex items-center gap-2 active:scale-95 transition-all shadow-lg">
                <span id="refreshText">Refresh Data</span>
            </button>
        </nav>

        <!-- Modal History -->
        <div id="modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex items-end sm:items-center justify-center p-0 sm:p-4">
            <div class="bg-white w-full max-w-md rounded-t-[2.5rem] sm:rounded-[2.5rem] p-8 animate-slide-up shadow-2xl max-h-[90vh] flex flex-col">
                <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto mb-8 sm:hidden shrink-0"></div>
                
                <div class="mb-6 shrink-0">
                    <p id="modalSku" class="text-[10px] font-black text-blue-600 uppercase tracking-[0.2em] mb-2"></p>
                    <h2 id="modalTitle" class="text-2xl font-bold text-slate-900 leading-tight">Detail Riwayat</h2>
                    <p id="modalSupplier" class="text-xs text-slate-400 mt-1"></p>
                </div>
                
                <div class="flex-1 overflow-y-auto mb-6 pr-2">
                    <label class="block text-[11px] font-bold text-slate-400 uppercase mb-4 tracking-widest">Log Kedatangan</label>
                    <div id="historyList" class="relative history-line pl-8 space-y-6">
                        <!-- Timeline dates will go here -->
                    </div>
                </div>

                <div class="flex gap-4 pt-4 border-t border-slate-100 shrink-0">
                    <button onclick="closeModal()" class="flex-1 py-4.5 font-bold text-white bg-slate-900 rounded-2xl shadow-xl shadow-slate-100 active:scale-[0.98] transition-all">Tutup</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwQEsejr1HzpXCmKVcUyQdBscFaRPs6pYnmafShcBY42b9sgu9xSlfTEtUDfiK3xkog/exec"; 

        let rawInventory = [];
        let groupedInventory = {};

        function getValue(item, keyName) {
            const keys = Object.keys(item);
            const foundKey = keys.find(k => k.toLowerCase().trim() === keyName.toLowerCase());
            return foundKey ? item[foundKey] : "";
        }

        function formatDate(dateStr) {
            if (!dateStr) return "Belum Ada";
            try {
                const date = new Date(dateStr);
                if (isNaN(date.getTime())) return dateStr;
                return new Intl.DateTimeFormat('id-ID', { day: '2-digit', month: 'short', year: 'numeric' }).format(date);
            } catch (e) { return dateStr; }
        }

        async function fetchData() {
            const container = document.getElementById('itemList');
            const refreshBtn = document.getElementById('refreshBtn');
            const statusDot = document.getElementById('connectionStatus');

            refreshBtn.disabled = true;
            document.getElementById('refreshText').innerText = "Syncing...";
            
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                rawInventory = data;

                // Grouping logic by SKU
                groupedInventory = {};
                data.forEach(item => {
                    const sku = String(getValue(item, 'sku') || 'N/A');
                    if (!groupedInventory[sku]) {
                        groupedInventory[sku] = {
                            sku: sku,
                            description: String(getValue(item, 'item description') || 'Tanpa Deskripsi'),
                            supplier: String(getValue(item, 'nama supplier') || '-'),
                            arrivals: []
                        };
                    }
                    const arrivalDate = getValue(item, 'tanggal diterima');
                    if (arrivalDate) {
                        groupedInventory[sku].arrivals.push(arrivalDate);
                    }
                });

                statusDot.className = "h-2.5 w-2.5 rounded-full bg-green-500 shadow-[0_0_10px_rgba(34,197,94,0.6)]";
                renderItems(Object.values(groupedInventory));
            } catch (e) {
                console.error(e);
                statusDot.className = "h-2.5 w-2.5 rounded-full bg-red-500 shadow-[0_0_10px_rgba(239,68,68,0.6)] animate-pulse";
            } finally {
                refreshBtn.disabled = false;
                document.getElementById('refreshText').innerText = "Refresh Data";
            }
        }

        function renderItems(items) {
            const container = document.getElementById('itemList');
            document.getElementById('totalCount').innerText = items.length;
            
            if (items.length === 0) {
                container.innerHTML = `<div class="text-center py-20 opacity-40"><p class="font-bold">Data Kosong</p></div>`;
                return;
            }

            container.innerHTML = '';
            items.forEach(item => {
                const count = item.arrivals.length;
                const lastDate = count > 0 ? formatDate(item.arrivals[count-1]) : 'Belum Diterima';
                
                const card = document.createElement('div');
                card.className = "p-6 rounded-[2.2rem] mb-5 border border-slate-100 bg-white shadow-sm hover:shadow-md transition-all cursor-pointer active:scale-[0.96]";
                card.onclick = () => openModal(item.sku);
                
                card.innerHTML = `
                    <div class="flex justify-between items-start gap-4">
                        <div class="flex-1">
                            <span class="text-[10px] font-black text-blue-600 uppercase tracking-[0.15em] mb-1.5 block">${item.sku}</span>
                            <h3 class="font-bold text-slate-900 leading-tight text-lg mb-2">${item.description}</h3>
                            <div class="flex items-center gap-2">
                                <span class="bg-slate-100 text-slate-500 text-[9px] px-2 py-1 rounded-lg font-black uppercase tracking-wider">${item.supplier}</span>
                            </div>
                        </div>
                        <div class="shrink-0 text-right">
                             ${count > 0 ? 
                                `<div class="bg-blue-600 text-white px-3 py-1 rounded-full text-[10px] font-black mb-2">${count}x MASUK</div>` :
                                `<div class="bg-slate-100 text-slate-400 px-3 py-1 rounded-full text-[10px] font-black mb-2">EMPTY</div>`
                             }
                        </div>
                    </div>
                    <div class="mt-5 pt-4 border-t border-slate-50 flex items-center justify-between">
                        <span class="text-[10px] font-black text-slate-400 uppercase tracking-[0.1em]">Kedatangan Terakhir</span>
                        <span class="text-xs font-bold text-slate-800">${lastDate}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function openModal(sku) {
            const item = groupedInventory[sku];
            document.getElementById('modalTitle').innerText = item.description;
            document.getElementById('modalSku').innerText = "DATA SKU: " + item.sku;
            document.getElementById('modalSupplier').innerText = "Supplier: " + item.supplier;
            
            const historyList = document.getElementById('historyList');
            historyList.innerHTML = '';

            if (item.arrivals.length === 0) {
                historyList.innerHTML = `<p class="text-slate-400 text-sm italic">Belum ada riwayat kedatangan untuk barang ini.</p>`;
            } else {
                // Sort dates: latest first
                const sortedArrivals = [...item.arrivals].sort((a, b) => new Date(b) - new Date(a));
                
                sortedArrivals.forEach((date, i) => {
                    const entry = document.createElement('div');
                    entry.className = "relative";
                    entry.innerHTML = `
                        <div class="absolute -left-[23px] top-1 h-4 w-4 rounded-full border-4 border-white ${i === 0 ? 'bg-blue-600' : 'bg-slate-300'} shadow-sm"></div>
                        <div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl">
                            <div>
                                <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">Diterima Pada</p>
                                <p class="text-sm font-bold text-slate-800">${formatDate(date)}</p>
                            </div>
                            <span class="text-[10px] font-bold text-slate-400 bg-white px-2 py-1 rounded-lg border border-slate-100">LOG #${sortedArrivals.length - i}</span>
                        </div>
                    `;
                    historyList.appendChild(entry);
                });
            }
            
            document.getElementById('modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('modal').classList.add('hidden');
        }

        // Search in Grouped Items
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase().trim();
            const filtered = Object.values(groupedInventory).filter(i => 
                i.sku.toLowerCase().includes(val) || 
                i.description.toLowerCase().includes(val)
            );
            renderItems(filtered);
        });

        document.getElementById('modal').onclick = (e) => {
            if(e.target.id === 'modal') closeModal();
        };

        window.onload = fetchData;
    </script>
</body>
</html>
